<?xml version="1.0" encoding="UTF-8"?>
<!-- Deepmarks pennant — centered, padded, transparent bg.
     Sprite bounding box (x 8–24, y 4–28) is centered in the 32×32
     canvas so a circular avatar crop (Damus, Primal, etc.) leaves
     clean whitespace around it. Transparent bg lets the host UI
     show through.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="512" height="512"
     viewBox="0 0 32 32"
     shape-rendering="crispEdges">
  <!-- mast: 2-unit column, 24 tall, padded 4 top + 4 bottom -->
  <rect x="8"  y="4"  width="2"  height="24" fill="#ff6b5a"/>
  <!-- stepped-triangle pennant, centered vertically against the mast -->
  <rect x="10" y="6"  width="4"  height="2"  fill="#ff6b5a"/>
  <rect x="10" y="8"  width="8"  height="2"  fill="#ff6b5a"/>
  <rect x="10" y="10" width="12" height="2"  fill="#ff6b5a"/>
  <rect x="10" y="12" width="14" height="2"  fill="#ff6b5a"/>
  <rect x="10" y="14" width="12" height="2"  fill="#ff6b5a"/>
  <rect x="10" y="16" width="8"  height="2"  fill="#ff6b5a"/>
  <rect x="10" y="18" width="4"  height="2"  fill="#ff6b5a"/>
</svg>
