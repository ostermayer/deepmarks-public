# strfry config for the Deepmarks relay.
# Read-open: anyone can subscribe.
# Write-restricted via writePolicy: only kinds 39701 (bookmarks) and
# 9735 (zap receipts) are accepted. Pubkey-level restriction can be
# layered on later via payment-proxy's /relay/check-pubkey endpoint.

db = "/var/lib/strfry"

dbParams {
  maxreaders = 256
  mapsize = 10737418240   # 10 GB
  noReadAhead = false
}

relay {
  nofiles = 65536
  bind = "0.0.0.0"
  port = 7777

  # Public-facing header used in the relay information document (NIP-11).
  # `pubkey` advertises the relay-operator identity (the brand npub) so
  # clients can show a recognizable owner instead of an anonymous relay.
  # `icon` shows the brand pennant in relay pickers (Damus/Amethyst/etc).
  info {
    name = "deepmarks"
    description = "deepmarks: social bookmarking via Nostr"
    pubkey = "2944e915ba71cf0fc19f5dda048ce053a87c01fd7478b179330a17edca4ce2f4"
    contact = "alerts@deepmarks.org"
    icon = "https://deepmarks.org/pennant.svg"
    software = "git+https://github.com/hoytech/strfry.git"
    version = "latest"
  }

  # Conservative defaults; Box A has 4 GB total.
  maxWebsocketPayloadSize = 262144
  autoPingSeconds = 55
  writePolicy {
    plugin = "/opt/strfry-policies/deepmarks.js"
    lookbackSeconds = 0
  }
  maxFilterLimit = 500
  maxSubsPerConnection = 20
}

events {
  maxEventSize = 65536
  rejectEventsOlderThanSeconds = 94608000   # 3 years
  rejectEventsNewerThanSeconds = 900        # 15 min skew
  rejectEphemeralEventsOlderThanSeconds = 60
  ephemeralEventsLivetimeSeconds = 300
  maxNumTags = 2000
  maxTagValSize = 1024
}
