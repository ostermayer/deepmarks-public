<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=400, initial-scale=1" />
    <title>Deepmarks</title>
    <style>
      html, body { margin: 0; padding: 0; }
      body {
        width: 400px;
        height: 560px;
        background: #fbfaf7;
        color: #1a1a1a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.45;
        overflow: hidden;
      }
      #root { width: 100%; height: 100%; }
      /* Inline outline:none on individual buttons doesn't always win
         against ::focus-visible in older Chromium builds. Suppress
         the default focus indicator globally for the popup — the
         400×560 surface is mouse-driven and our active-state styles
         already convey selection. Keyboard users still see the
         system caret in inputs. */
      button:focus, button:focus-visible {
        outline: none !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
